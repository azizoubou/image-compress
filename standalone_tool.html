<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilder verkleinern: Schnell, kostenlos & 100% Datenschutz</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='28' height='28' rx='6' fill='%236366f1'/%3E%3Cpath d='M16 8v12M10 14l6 6 6-6' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Crect x='6' y='24' width='20' height='2' rx='1' fill='white' opacity='0.6'/%3E%3C/svg%3E" />
    <meta name="description" content="Bilder verkleinern ohne Upload! Maximale Privatsphäre durch lokale Bearbeitung im Browser. Ideal für Foren wie T4-Forum & Hausgarten.net.">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
        .primary-gradient { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: #6366f1; transition: all 0.2s; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        .toggle-active { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        .switch { width: 40px; height: 20px; background: #cbd5e1; border-radius: 20px; position: relative; transition: background 0.2s; }
        .switch-active { background: #6366f1; }
        .slider { width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
        .slider-active { transform: translateX(20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const translations = {
            de: {
                metaTitle: "Bilder verkleinern: Schnell, kostenlos & 100% Datenschutz",
                slogan: "Schnell, kostenlos & mit maximalem Datenschutz.",
                brand: "bilder-verkleinern.net",
                dropTitle: "Bilder hierher ziehen",
                dropSub: "oder klicken zum Auswählen",
                settings: "Einstellungen",
                forumMode: "Forum-Optimierung (< 10KB)",
                forumDesc: "Ideal für T4-Forum & Hausgarten.net",
                compress: "Bilder verkleinern",
                compressing: "Wird verkleinert...",
                original: "Original",
                optimized: "Optimiert",
                download: "Bilder sicher speichern",
                privacy: "Ihre Bilder verlassen niemals Ihren Computer. Die Verarbeitung erfolgt lokal im Browser.",
                success: "Fertig! Ersparnis:",
                maxSize: "Max. Dateigröße",
                maxWidth: "Max. Breite/Höhe",
                back: "Zurück",
                legalTitle: "Impressum & Datenschutz",
                legalContent: "Kompression zu 100% lokal im Browser. Kein Upload auf Server. Verantwortlich: bilder-verkleinern.net | support@bilder-verkleinern.net"
            },
            en: {
                metaTitle: "bilder-verkleinern.net - Fast & Secure Image Compression",
                slogan: "Fast, free & with maximum privacy.",
                brand: "bilder-verkleinern.net",
                dropTitle: "Drag & drop your image here",
                dropSub: "or click to browse files",
                settings: "Compression Settings",
                forumMode: "Forum Optimization (< 10KB)",
                forumDesc: "Auto-scaling for forums & avatars.",
                compress: "Compress Image",
                compressing: "Compressing...",
                original: "Original",
                optimized: "Optimized",
                download: "Download Securely",
                privacy: "Your images never leave your computer. Processing is 100% local.",
                success: "Done! Savings:",
                maxSize: "Max File Size",
                maxWidth: "Max Width/Height",
                back: "Back",
                legalTitle: "Imprint & Privacy",
                legalContent: "100% local browser processing. No uploads. Responsible: bilder-verkleinern.net | support@bilder-verkleinern.net"
            }
        };

        function App() {
            const [lang, setLang] = useState('de');
            const t = translations[lang];
            const [file, setFile] = useState(null);
            const [settings, setSettings] = useState({ maxSize: 1, maxWidth: 1920, forumMode: true });
            const [isCompressing, setIsCompressing] = useState(false);
            const [result, setResult] = useState(null);
            const [showLegal, setShowLegal] = useState(false);
            const fileInputRef = useRef(null);

            const handleFileSelect = (e) => {
                const selected = e.target.files[0];
                if (selected && selected.type.startsWith('image/')) {
                    setFile(selected);
                    setResult(null);
                }
            };

            const formatSize = (bytes) => {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + ['Bytes', 'KB', 'MB'][i];
            };

            const compress = async () => {
                setIsCompressing(true);
                try {
                    const img = new Image();
                    img.src = URL.createObjectURL(file);
                    await new Promise(resolve => img.onload = resolve);

                    let quality = 0.8;
                    let scale = 1.0;
                    let blob;
                    const targetSize = settings.forumMode ? 10 * 1024 : settings.maxSize * 1024 * 1024;

                    while (true) {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
                        
                        if (blob.size < targetSize) break;
                        
                        if (settings.forumMode) {
                            if (quality > 0.2) quality -= 0.1;
                            else { scale *= 0.9; quality = 0.8; }
                        } else {
                            if (quality > 0.1) quality -= 0.1;
                            else break;
                        }
                        if (scale < 0.05) break;
                    }

                    setResult({
                        originalUrl: img.src,
                        compressedUrl: URL.createObjectURL(blob),
                        originalSize: file.size,
                        compressedSize: blob.size,
                        savings: ((file.size - blob.size) / file.size) * 100
                    });
                } catch (e) {
                    alert("Fehler!");
                }
                setIsCompressing(false);
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-12">
                    <nav className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-2 font-bold text-xl text-indigo-600">
                            <span className="text-2xl">🖼️</span>
                            <span>{t.brand}</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setLang('de')} className={`px-3 py-1 rounded text-sm font-semibold ${lang === 'de' ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>DE</button>
                            <button onClick={() => setLang('en')} className={`px-3 py-1 rounded text-sm font-semibold ${lang === 'en' ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>EN</button>
                        </div>
                    </nav>

                    <header className="text-center mb-12">
                        <h1 className="text-4xl font-extrabold mb-4 primary-gradient">{t.brand}</h1>
                        <p className="text-slate-600 text-lg">{t.slogan}</p>
                    </header>

                    <main className="space-y-8">
                        {!showLegal ? (
                            <>
                                {!result ? (
                                    <div className="space-y-6">
                                        <div 
                                            className="drop-zone glass h-64 rounded-2xl flex flex-col items-center justify-center cursor-pointer"
                                            onClick={() => fileInputRef.current.click()}
                                        >
                                            <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileSelect} accept="image/*" />
                                            <span className="text-5xl mb-4">📤</span>
                                            <h3 className="text-xl font-bold">{file ? file.name : t.dropTitle}</h3>
                                            <p className="text-slate-500">{t.dropSub}</p>
                                        </div>

                                        <div className="glass p-6 rounded-2xl max-w-md mx-auto">
                                            <div className="flex items-center gap-2 mb-6 font-bold">
                                                <span>⚙️</span> {t.settings}
                                            </div>

                                            <div 
                                                className={`flex items-center gap-4 p-4 rounded-xl border-2 cursor-pointer transition-all mb-6 ${settings.forumMode ? 'toggle-active' : 'bg-slate-50 border-slate-200'}`}
                                                onClick={() => setSettings({...settings, forumMode: !settings.forumMode})}
                                            >
                                                <span className="text-2xl">🛡️</span>
                                                <div className="flex-1">
                                                    <div className="text-sm font-bold">{t.forumMode}</div>
                                                    <div className="text-xs text-slate-500">{t.forumDesc}</div>
                                                </div>
                                                <div className={`switch ${settings.forumMode ? 'switch-active' : ''}`}>
                                                    <div className={`slider ${settings.forumMode ? 'slider-active' : ''}`}></div>
                                                </div>
                                            </div>

                                            {!settings.forumMode && (
                                                <div className="space-y-6">
                                                    <div>
                                                        <div className="flex justify-between text-sm mb-2">
                                                            <span className="text-slate-500">{t.maxSize}</span>
                                                            <span className="font-bold text-indigo-600">{settings.maxSize} MB</span>
                                                        </div>
                                                        <input type="range" min="0.1" max="10" step="0.1" value={settings.maxSize} onChange={e => setSettings({...settings, maxSize: e.target.value})} className="w-full accent-indigo-600" />
                                                    </div>
                                                </div>
                                            )}

                                            <button 
                                                className="w-full btn-primary text-white font-bold py-4 rounded-xl mt-6 disabled:opacity-50"
                                                disabled={!file || isCompressing}
                                                onClick={compress}
                                            >
                                                {isCompressing ? t.compressing : t.compress}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-8 animate-in fade-in duration-500">
                                        <div className="bg-green-100 text-green-800 p-4 rounded-xl flex items-center justify-center gap-2 font-bold">
                                            <span>✅</span> {t.success} {result.savings.toFixed(1)}%
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="glass p-4 rounded-2xl">
                                                <div className="text-xs font-bold text-slate-400 mb-4 uppercase">{t.original}</div>
                                                <div className="aspect-video bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center mb-4">
                                                    <img src={result.originalUrl} className="max-w-full max-h-full object-contain" />
                                                </div>
                                                <div className="text-center font-bold">{formatSize(result.originalSize)}</div>
                                            </div>
                                            <div className="glass p-4 rounded-2xl">
                                                <div className="text-xs font-bold text-slate-400 mb-4 uppercase">{t.optimized}</div>
                                                <div className="aspect-video bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center mb-4">
                                                    <img src={result.compressedUrl} className="max-w-full max-h-full object-contain" />
                                                </div>
                                                <div className="text-center font-bold text-green-600">{formatSize(result.compressedSize)}</div>
                                            </div>
                                        </div>

                                        <div className="flex flex-col gap-4 max-w-md mx-auto">
                                            <a 
                                                href={result.compressedUrl} 
                                                download={`optimized_${file.name}`}
                                                className="btn-primary text-white font-bold py-4 rounded-xl text-center"
                                            >
                                                ⬇️ {t.download}
                                            </a>
                                            <button onClick={() => setResult(null)} className="text-slate-500 font-bold hover:text-indigo-600 transition-colors">
                                                ← {t.back}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="glass p-8 rounded-2xl space-y-6">
                                <h2 className="text-2xl font-bold">{t.legalTitle}</h2>
                                <p className="text-slate-600 leading-relaxed">{t.legalContent}</p>
                                <p className="font-bold text-indigo-600">{t.privacy}</p>
                                <button onClick={() => setShowLegal(false)} className="text-indigo-600 font-bold">← {t.back}</button>
                            </div>
                        )}
                        
                        <div className="text-center space-y-4 mt-12">
                            <p className="text-slate-500 text-sm">{t.privacy}</p>
                            <button onClick={() => setShowLegal(true)} className="text-slate-400 text-xs hover:underline uppercase tracking-widest font-bold">{t.legalTitle}</button>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
